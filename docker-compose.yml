services:

  postgres:
    image: postgres:16
    container_name: pme-postgres
    environment:
      POSTGRES_USER: pme_user
      POSTGRES_PASSWORD: pme_password
      POSTGRES_DB: pme_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pme-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pme_user -d pme_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: pme-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/pme_db
      KC_DB_USERNAME: pme_user
      KC_DB_PASSWORD: pme_password
    ports:
      - "8180:8080"
    command: start-dev
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pme-network

volumes:
  postgres_data:

networks:
  pme-network:
    driver: bridge