# ── SERVEUR ──
server.port=8080

# ── BASE DE DONNÉES ──
spring.datasource.url=jdbc:postgresql://localhost:5432/pme_db
spring.datasource.username=pme_user
spring.datasource.password=pme_password
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / HIBERNATE ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ── KEYCLOAK / OAUTH2 ──
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/pme

# ── APP ──
app.name=Petite Maison de l'Epouvante